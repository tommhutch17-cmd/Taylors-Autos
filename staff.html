<!doctype html><html lang="en-GB"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Staff Dashboard | Taylor's Autos</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Oswald:wght@500;600;700&family=IBM+Plex+Mono:wght@600&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script></head><body class="dashboard"><header class="topbar"><div class="container nav"><a class="brand" href="index.html"><span class="brandmark">TA</span><span><strong>Taylor's Autos</strong><small>Workshop management</small></span></a><a class="btn btn-outline" href="index.html">Public website</a></div></header><main class="dashboard-main"><section id="login-panel" class="container"><div class="card auth-card"><span class="eyebrow">Staff only</span><h1 style="color:var(--ink)">Sign in</h1><p>Use the staff account created in Supabase Authentication.</p><div id="login-error" class="hidden"></div><form id="login-form"><div class="field"><label for="staff-email">Email</label><input id="staff-email" type="email" required autocomplete="username"></div><div class="field"><label for="staff-password">Password</label><input id="staff-password" type="password" required autocomplete="current-password"></div><button class="btn btn-primary" type="submit">Log in</button></form></div></section><section id="dashboard-panel" class="container hidden"><div class="job-head"><div><span class="eyebrow">Workshop board</span><h1>Manage every active job.</h1></div><button class="btn btn-outline" onclick="logout()">Log out</button></div><div class="stats"><div class="stat"><strong id="stat-active">0</strong><span>Active jobs</span></div><div class="stat"><strong id="stat-ready">0</strong><span>Ready to collect</span></div><div class="stat"><strong id="stat-approval">0</strong><span>Awaiting approval</span></div><div class="stat"><strong id="stat-overdue">0</strong><span>Overdue</span></div></div><div class="toolbar"><input id="search" placeholder="Search name, registration or job number"><button class="btn btn-outline" onclick="loadJobs()">Refresh</button></div><div id="jobs" class="jobs"></div></section></main><script src="assets/js/config.js"></script><script src="assets/js/common.js"></script><script src="assets/js/staff.js"></script></body></html>
